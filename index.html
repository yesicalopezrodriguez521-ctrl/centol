<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El Centollo</title>

<link rel="stylesheet" href="css/estilos.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css">

<!-- MODAL ESTILOS BÁSICOS (si no los tienes en CSS) -->
<style>
.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  justify-content: center;
  align-items: center;
}

.modal-contenido {
  background: white;
  padding: 20px;
  border-radius: 10px;
  max-width: 400px;
  text-align: center;
}

.modal-contenido img {
  width: 100%;
  border-radius: 10px;
}

.cerrar {
  float: right;
  font-size: 24px;
  cursor: pointer;
}

#cerrarBtn {
  margin-top: 10px;
  padding: 8px 15px;
  border: none;
  background: black;
  color: white;
  border-radius: 5px;
  cursor: pointer;
}
</style>

</head>

<body>

<!-- HEADER -->
<header class="header">
   <img src="img/logo.png" alt="Logo El Centollo" style="width:120px; display:block; margin:10px auto;">
   <h1>Restaurante El Centollo</h1>
</header>

<!-- NAV -->
<nav class="nav">
    <a href="index.html">Inicio</a>
    <a href="menu.html">Menú</a>
    <a href="contacto.html">Contáctanos</a>
    <a href="ubicacion.html">Ubicación</a>
    <a href="reservas.html">Reservas</a>
    <a href="integrantes.html">Integrantes</a>
</nav>

<!-- SLIDER -->
<div class="slider">

    <div class="img">
        <img id="slide" src="img/slide1.jpg">
    </div>

    <div class="info">
        <h2 id="titulo"></h2>
        <p id="texto"></p>
    </div>

</div>

<!-- FOOTER PRINCIPAL -->
<footer>

<div class="logos">
    <img src="img/logo2.jpg">
    <img src="img/logo3.jpg">
    <img src="img/logo4.jpg">
    <img src="img/logo5.jpg">
    <img src="img/logo6.jpg">
</div>

<p>Yesica Jimena López – Isabella Sarmiento Piñeros</p>
<p>📧 centollo@gmail.com</p>

<div class="redes">
    <a href="#"><i class="fab fa-facebook-f"></i></a>
    <a href="#"><i class="fab fa-instagram"></i></a>
    <a href="#"><i class="fab fa-whatsapp"></i></a>
</div>

</footer>

<!-- MODAL PROMOCIÓN (CORRECTO) -->
<div id="modalPromo" class="modal">
  <div class="modal-contenido">
    <span class="cerrar">&times;</span>

    <h2>🎉 PROMOCIÓN ESPECIAL 🎉</h2>

    <img src="img/p9.JPG" alt="Promoción">

    <p>
      ¡Bienvenido a <strong>El Centollo</strong>!  
      Esta semana disfruta de un <strong>20% de descuento</strong>.
    </p>

    <button id="cerrarBtn">Cerrar</button>
  </div>
</div>

<!-- SCRIPTS -->
<script src="js/slider.js"></script>

<script>
/* FECHA */
document.addEventListener("DOMContentLoaded", function() {

  /* MODAL */
  const modal = document.getElementById("modalPromo");
  const cerrar = document.querySelector(".cerrar");
  const cerrarBtn = document.getElementById("cerrarBtn");

  /* mostrar modal al entrar */
  modal.style.display = "flex";

  /* cerrar modal */
  cerrar.onclick = function () {
    modal.style.display = "none";
  }

  cerrarBtn.onclick = function () {
    modal.style.display = "none";
  }

});
</script>

</body>
</html>
